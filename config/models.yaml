# Anima Agent 国产模型路由配置
# 安装: openclaw config set models --file models.yaml
# 或由 install.ps1 自动导入

mode: merge

providers:
  deepseek:
    baseUrl: https://api.deepseek.com
    api: openai-completions
    apiKey: "${DEEPSEEK_API_KEY}"
    models:
      - id: deepseek-v4-flash
        name: "DeepSeek V4 Flash (免费)"
        reasoning: true
        input: [text]
        contextWindow: 1000000
        maxTokens: 384000
        cost:
          input: 0
          output: 0
          cacheRead: 0
          cacheWrite: 0
      - id: deepseek-v4-pro
        name: "DeepSeek V4 Pro"
        reasoning: true
        input: [text]
        contextWindow: 1000000
        maxTokens: 384000
        cost:
          input: 0.14
          output: 0.28
          cacheRead: 0.028
          cacheWrite: 0

  qwen:
    baseUrl: https://dashscope.aliyuncs.com/compatible-mode/v1
    api: openai-completions
    apiKey: "${QWEN_API_KEY}"
    models:
      - id: qwen-turbo
        name: "Qwen Turbo (免费额度)"
        reasoning: false
        input: [text]
        contextWindow: 131072
        maxTokens: 8192
        cost:
          input: 0
          output: 0
          cacheRead: 0
          cacheWrite: 0
      - id: qwen3-235b-a22b
        name: "Qwen3 235B (阿里)"
        reasoning: true
        input: [text]
        contextWindow: 131072
        maxTokens: 8192
        cost:
          input: 1.0
          output: 4.0
          cacheRead: 0
          cacheWrite: 0

  zhipu:
    baseUrl: https://open.bigmodel.cn/api/paas/v4
    api: openai-completions
    apiKey: "${ZHIPU_API_KEY}"
    models:
      - id: glm-4.6
        name: "GLM-4.6 (智谱)"
        reasoning: true
        input: [text]
        contextWindow: 128000
        maxTokens: 8192
        cost:
          input: 1.0
          output: 1.0
          cacheRead: 0
          cacheWrite: 0

  minimax:
    baseUrl: https://api.minimax.chat/v1
    api: openai-completions
    apiKey: "${MINIMAX_API_KEY}"
    models:
      - id: minimax-m1
        name: "MiniMax M1"
        reasoning: true
        input: [text]
        contextWindow: 1000000
        maxTokens: 16384
        cost:
          input: 0.5
          output: 5.0
          cacheRead: 0
          cacheWrite: 0

  doubao:
    baseUrl: https://ark.cn-beijing.volces.com/api/v3
    api: openai-completions
    apiKey: "${DOUBAO_API_KEY}"
    models:
      - id: doubao-1.5-pro-256k
        name: "豆包 1.5 Pro (字节)"
        reasoning: true
        input: [text]
        contextWindow: 256000
        maxTokens: 8192
        cost:
          input: 0.8
          output: 2.0
          cacheRead: 0
          cacheWrite: 0

pricing:
  enabled: false
